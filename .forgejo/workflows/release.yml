name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          registry: git.aads.cloud
          username: ${{ forgejo.repository_owner }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Run GoReleaser
        uses: https://github.com/goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}

      - name: Publish Debian packages
        run: |
          for f in dist/*.deb; do
            curl -sS --fail \
              --user "${{ github.repository_owner }}:${{ secrets.FORGEJO_TOKEN }}" \
              --upload-file "$f" \
              "https://git.aads.cloud/api/packages/aad/debian/pool/stable/main/upload"
          done
