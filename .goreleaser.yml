project_name: bitcoind-exporter

gitea_urls:
  api: https://git.aads.cloud/api/v1/
  download: https://git.aads.cloud/

builds:
  - env:
      - CGO_ENABLED=0
    binary: bitcoind-exporter
    goos:
      - linux
    goarch:
      - amd64
      - arm64

dockers:
  - image_templates:
      - "git.aads.cloud/AdriaanConijn/bitcoind-exporter:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "git.aads.cloud/AdriaanConijn/bitcoind-exporter:{{ .Version }}-arm64v8"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64/v8"

docker_manifests:
  - name_template: "git.aads.cloud/AdriaanConijn/bitcoind-exporter:{{ .Version }}"
    image_templates:
      - "git.aads.cloud/AdriaanConijn/bitcoind-exporter:{{ .Version }}-amd64"
      - "git.aads.cloud/AdriaanConijn/bitcoind-exporter:{{ .Version }}-arm64v8"
  - name_template: "git.aads.cloud/AdriaanConijn/bitcoind-exporter:latest"
    image_templates:
      - "git.aads.cloud/AdriaanConijn/bitcoind-exporter:{{ .Version }}-amd64"
      - "git.aads.cloud/AdriaanConijn/bitcoind-exporter:{{ .Version }}-arm64v8"
