project_name: bitcoind-exporter

gitea_urls:
  api: https://git.aads.cloud/api/v1/
  download: https://git.aads.cloud/

builds:
  - env:
      - CGO_ENABLED=0
    binary: bitcoind-exporter
    goos:
      - linux
    goarch:
      - amd64
      - arm64

nfpms:
  - package_name: bitcoind-exporter
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: aad
    homepage: https://git.aads.cloud/aad/bitcoind-metrics-exporter
    maintainer: Adriaan Conijn <adriaan.conijn@gmail.com>
    description: Prometheus/OpenTelemetry exporter for bitcoind metrics
    license: GPL-3.0
    formats:
      - deb
    bindir: /usr/bin
    contents:
      - src: packaging/bitcoind-exporter.service
        dst: /lib/systemd/system/bitcoind-exporter.service
      - src: packaging/bitcoind-exporter.env
        dst: /etc/bitcoind-exporter/bitcoind-exporter.env
        type: config|noreplace
    scripts:
      postinstall: packaging/postinstall.sh
      preremove: packaging/preremove.sh
      postremove: packaging/postremove.sh

dockers:
  - image_templates:
      - "git.aads.cloud/aad/bitcoind-metrics-exporter:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "git.aads.cloud/aad/bitcoind-metrics-exporter:{{ .Version }}-arm64v8"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64/v8"

docker_manifests:
  - name_template: "git.aads.cloud/aad/bitcoind-metrics-exporter:{{ .Version }}"
    image_templates:
      - "git.aads.cloud/aad/bitcoind-metrics-exporter:{{ .Version }}-amd64"
      - "git.aads.cloud/aad/bitcoind-metrics-exporter:{{ .Version }}-arm64v8"
  - name_template: "git.aads.cloud/aad/bitcoind-metrics-exporter:latest"
    image_templates:
      - "git.aads.cloud/aad/bitcoind-metrics-exporter:{{ .Version }}-amd64"
      - "git.aads.cloud/aad/bitcoind-metrics-exporter:{{ .Version }}-arm64v8"
